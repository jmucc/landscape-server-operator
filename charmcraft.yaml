# Learn more about charmcraft.yaml configuration at:
# https://juju.is/docs/sdk/charmcraft-config
type: "charm"

platforms:
  ubuntu@22.04:amd64:
  ubuntu@22.04:arm64:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:

charm-libs:
  - lib: data_platform_libs.data_interfaces
    version: "0"
  - lib: traefik_k8s.ingress
    version: "2"

parts:
  # "uv-deps" is a magic part name charmcraft uses to satisfy the uv plugin's
  # environment validation before the charm part runs
  uv-deps:
    plugin: nil
    build-packages:
      - curl
    override-build: |
      curl -LsSf https://astral.sh/uv/0.10.8/install.sh | sh  # renovate: charmcraft-uv-latest
      ln -sf "$HOME/.local/bin/uv" /usr/local/bin/uv
  charm:
    plugin: uv
    source: .
    build-packages:
      - libffi-dev # Needed to build Python dependencies with Rust from source
      - libssl-dev # Needed to build Python dependencies with Rust from source
      - pkg-config # Needed to build Python dependencies with Rust from source
    after:
      - uv-deps
